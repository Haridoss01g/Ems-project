{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit_html</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'employee\style.css' %}">
</head>
<body>
     <div class="header">
    <h1 class="fw-bold"><i class="bi bi-person-square"></i>Edit Employee</h1>
    <p>Update the employee details below and save the changes</p>
</div>
<div class="container my-5">
    <div class="card employee-card">
        <div class="card-body p-4">

            <h3 class="mb-1">Employee Information</h3>
            <p class="second">
                Make changes to employee information and save updates.
            </p>

            <form method="POST">
               {% csrf_token %}
                <div class="row">
                    <div class="mb-3">
                        <label>Emp_id</label>
                        <input type="text" class="form-control" value="{{ employee.emp_id }}" readonly>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" name="name" value="{{ employee.name }}"
                        placeholder="Enter full name">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Department</label>
                        <select class="form-select" name="department" valu="{{ employee.department }}">
                            <option>Select Department</option>
                            <option>HR</option>
                            <option>IT</option>
                            <option>Finance</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control"
                        placeholder="Enter email address"name="email" value="{{ employee.email }}"required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control"name="phone" value="{{ employee.phone}}"
                        placeholder="Enter phone number">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Designation</label>
                        <input type="text" class="form-control" name="designation" value="{{ employee.designation }}"
                        placeholder="Enter designation">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Salary</label>
                        <input type="number" class="form-control" name="salary" value="{{ employee.salary }}"
                        placeholder="Enter salary">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Address</label>
                    <textarea class="form-control" rows="4" name="address" value="{{ employee.address }}"
                    placeholder="Enter address"></textarea>
                </div>

                <div class="text-end">
                    <button type="reset"
                    class="btn btn-secondary me-2">
                        Cancel
                    </button>

                    <button type="submit"
                    class="btn btn-primary">
                        Update
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>
</body>
</html>
